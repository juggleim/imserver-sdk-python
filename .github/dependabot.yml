version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Etc/UTC
    target-branch: master
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Etc/UTC
    target-branch: master
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
